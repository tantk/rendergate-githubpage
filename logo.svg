<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#26a83d"/>
    </linearGradient>
  </defs>

  <!-- Background: GitHub dark, rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="#0d1117"/>

  <!-- Subtle inner border -->
  <rect x="8" y="8" width="496" height="496" rx="76" ry="76"
        fill="none" stroke="#21262d" stroke-width="2"/>

  <!-- Logo group with glow -->
  <g filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left bracket [ -->
    <path d="M 130 140 L 100 140 L 100 372 L 130 372"
          stroke="url(#grad)" stroke-width="28"/>

    <!-- Right bracket ] -->
    <path d="M 382 140 L 412 140 L 412 372 L 382 372"
          stroke="url(#grad)" stroke-width="28"/>

    <!-- Center chevron > (the "render" arrow passing through the gate) -->
    <path d="M 200 180 L 296 256 L 200 332"
          stroke="#39d353" stroke-width="36"/>
  </g>

  <!-- Tiny terminal cursor underline -->
  <rect x="226" y="412" width="60" height="6" rx="3" fill="#39d353" opacity="0.7"/>
</svg>
